<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handwriting Recognition App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-lg">
                    <div class="card-header bg-primary text-white text-center">
                        <h2>Handwriting Recognition</h2>
                        <p class="mb-0">Upload an image of handwritten text to extract it using AI-powered OCR.</p>
                    </div>
                    <div class="card-body">
                        <form id="uploadForm" method="post" enctype="multipart/form-data">
                            <div class="mb-3">
                                <label for="image" class="form-label">Select Image (JPG/PNG):</label>
                                <input type="file" class="form-control" id="image" name="image" accept="image/*" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Recognize Handwriting</button>
                        </form>
                        
                        <div id="loading" class="text-center mt-3" style="display: none;">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Processing...</span>
                            </div>
                            <p>Processing your image...</p>
                        </div>
                        
                        <div id="results" class="mt-4" style="display: none;">
                            <h4>Extracted Text:</h4>
                            <div class="alert alert-success" id="textResult"></div>
                            
                            <h4>Corrected Text:</h4>
                            <div class="alert alert-info" id="correctedResult"></div>

                            <h5>Original Image:</h5>
                            <img id="originalImg" class="img-fluid rounded border" alt="Original">
                            
                            <h5 class="mt-3">Processed Image:</h5>
                            <img id="processedImg" class="img-fluid rounded border" alt="Processed">
                        </div>
                        
                        <div id="error" class="alert alert-danger mt-3" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('uploadForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = new FormData();
    formData.append('image', document.getElementById('image').files[0]);
    
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    const errorDiv = document.getElementById('error');
    
    loading.style.display = 'block';
    results.style.display = 'none';
    errorDiv.style.display = 'none';
    
    fetch('/upload', {
        method: 'POST',
        body: formData
    })
    .then(response => {
        if (!response.ok) {
            return response.text().then(text => {
                throw new Error(`Server error ${response.status}: ${text.substring(0,200)}`);
            });
        }
        return response.json();
    })
    .then(data => {
        loading.style.display = 'none';
        if (data.success) {
            document.getElementById('textResult').textContent = data.text;
            document.getElementById('correctedResult').textContent = data.corrected;
            const timestamp = new Date().getTime();
            document.getElementById('originalImg').src = '/static/uploads/' + data.original_image + '?' + timestamp;
            document.getElementById('processedImg').src = '/static/uploads/' + data.processed_image + '?' + timestamp;
            results.style.display = 'block';
        } else {
            errorDiv.textContent = data.error || 'Unknown error';
            errorDiv.style.display = 'block';
        }
    })
    .catch(err => {
        loading.style.display = 'none';
        console.error('Fetch error:', err);
        errorDiv.textContent = 'An error occurred: ' + err.message;
        errorDiv.style.display = 'block';
    });
});
</script>
</body>
</html>
